# ============================================================
# チーム・選手・カードのマスタデータ
#
#     docker compose exec web bin/rails db:seed
#
# ============================================================
#
# 【ファイルの構成】
#   sets    … 弾。リリース順（古い順）で書く。新しい弾は末尾に追記する
#   teams   … クラブチーム。ここに書いた順で画面に並ぶ
#   players … 選手と、その選手が持つカード
#
# 【並び順のきまり】
#   弾   : YAML は古い順。画面では新しい順で表示される（seed が逆順に並べ替える）
#   チーム: YAML に書いた順がそのまま画面の順になる
#
# 【レア度・カード名】
#   レア度は 1〜5 の数字（画面では★に変換）。基本は 4〜5 を扱う
#   同じ選手が同じ弾に複数カードを持つ場合は cards の name で区別する
# ------------------------------------------------------------

# ============================================================
# 弾（カードセット）※リリースが古い順。新しい弾は末尾に追記
#   name  必須。画面に表示される弾の名前
#   slug  必須。英数字のみ。画像ファイル名にも使う
#         （app/assets/images/sets/<slug>.jpg）
# ============================================================
