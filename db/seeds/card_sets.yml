# ============================================================
# 選手とカードのマスタデータ
#
# このファイルが「選手とカードの情報の唯一の置き場所」。編集して
#
#     docker compose exec web bin/rails db:seed
#
# を実行すると、内容がデータベースに反映される。
# ここに書いたカードが、募集フォームの「欲しいカード」の選択肢になる。
# ============================================================
#
# 【ファイルの構成】
#
#   sets    … 弾そのものの情報（名前・説明・画像）。弾が増えたら追記する
#   players … 選手と、その選手が持つカード。カードが増えたらここに追記する
#
# 【なぜ選手が大きなくくりなのか】
#
# 1人の選手のカードは、いろいろな弾に散らばっている。
# （河村勇輝のカードが 記録達成 にも クリスマス にもある、など）
#
# 選手を軸にまとめておくと、「この選手のカードは今いくつあるか」が一目で分かる。
# また、所属クラブを選手に1回だけ書けばよくなるので、移籍したときも1行直すだけで済む。
# 弾ごとに選手を並べると、選手名とチームを何度も書くことになり、必ずどこかがズレる。
#
# 【レア度は弾ごとに違ってよい】
#
# レア度は選手ではなくカードの属性なので、cards の中に書く。
# 同じ選手が「記録達成ではSR、クリスマスではR」でも、そのまま書ける。
#
# 【同じ選手が同じ弾に複数のカードを持つ場合】
#
# 記録達成カードのように、1つの弾の中に同じ選手のカードが
# 何種類もあることがある（得点記録、アシスト記録、リバウンド記録…）。
# その場合は cards の name にカードの名前を書いて区別する。
# 1つの弾に1種類しかない選手なら name は省略してよい。
#
# ------------------------------------------------------------

# ============================================================
# 弾（カードセット）
#
#   name        必須。弾の名前。画面にそのまま表示される
#   slug        必須。英数字のみ。players の cards から参照するための名札。
#               将来ここに弾の画像を置くとき、ファイル名にもこれを使う
#               例: slug が record なら app/assets/images/sets/record.jpg
#   description 任意。弾の説明。一覧画面に出す。省略可
#
# 新しい弾が出たら、まずここに追記する。
#
# ↓↓↓ サンプル。実在の弾に書き換えてください ↓↓↓
# ============================================================
sets:
  - name: 記録達成カード
    slug: record
    description: 通算得点やアシストなどの記録達成を記念したカード

  - name: アワードカード
    slug: award
    description: シーズンの各賞受賞者を記念したカード

  - name: クリスマスカード
    slug: christmas
    description: クリスマス限定の特別デザインカード

# ============================================================
# 選手と、その選手のカード
#
#   name    必須。選手名。ここに書いた表記が「正」になる
#   team    必須。所属クラブ。チーム別の絞り込みに使う。移籍したらここを直す
#   cards   その選手のカード。持っていなければ空でよい
#     set     必須。上の sets に書いた slug を指定する
#             （sets にない slug を書くと seed がエラーで教えてくれる）
#     name    条件つき。カードの名前（得点記録、アシスト記録 など）。
#             同じ選手が同じ弾に複数のカードを持つときは必須。
#             その弾に1種類しかないなら省略してよい
#     rarity  必須。レア度を 1〜5 の数字で書く（画面では ★ に変換される）。
#             ☆1〜5すべて登録できるが、量が多いため基本は 4〜5 だけを扱う。
#             同じ選手でも弾ごとにレア度が違ってよい
#
# 新しい弾が出たら、収録された選手の cards に追記していく。
# 新顔の選手なら、このリストに追加する。
#
# ↓↓↓ サンプル。実在の選手に書き換えてください ↓↓↓
# ============================================================
players:
  - name: サンプル選手A
    team: サンプルチームX
    cards:
      # 同じ記録達成カード弾に2種類ある例。name で区別する
      - set: record
        name: 得点記録
        rarity: 5
      - set: record
        name: アシスト記録
        rarity: 4
      - set: award
        rarity: 5
      # 1種類しかない弾なので name は省略している
      - set: christmas
        rarity: 4

  - name: サンプル選手B
    team: サンプルチームY
    cards:
      - set: record
        name: リバウンド記録
        rarity: 4

  - name: サンプル選手C
    team: サンプルチームX
    cards:
      - set: award
        rarity: 5
